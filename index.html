<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Worker Geo-Arbitrage & Cost-of-Living Modeler</title>
    <style>
        :root {
            --bg-color: #0c0a09;
            --card-bg: #1c1917;
            --primary: #f97316;
            --primary-dim: #ea580c;
            --text-main: #f5f5f4;
            --text-muted: #a8a29e;
            --border-color: #2e2a24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.05);
            margin-bottom: 80px;
        }

        h1 {
            font-size: 22px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            min-height: 60px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            overflow: hidden;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 14px;
            color: var(--primary);
            font-weight: bold;
        }

        .pct-symbol {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
        }

        input[type="number"], select {
            width: 100%;
            background: #0c0a09;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="number"] {
            padding-left: 30px;
        }

        input[type="number"]:focus, select:focus {
            border-color: var(--primary);
        }

        .results-box {
            background: #0c0a09;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-main);
        }

        .result-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .result-value.highlight {
            color: #4ade80;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        #sticky-bottom-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0c0a09;
            border-top: 1px solid var(--border-color);
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Geo-Arbitrage Matrix</h1>
        <p class="subtitle">Calculate your real cost-of-living savings surplus by relocating remotely</p>

        <div id="monetag-banner-top" class="ad-container"></div>

        <div class="input-group">
            <label for="remote-salary">Net Monthly Remote Salary</label>
            <div class="input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="remote-salary" value="5000" oninput="calculateArbitrage()">
            </div>
        </div>

        <div class="input-group">
            <label for="current-rent">Current Home Country Monthly Expenses</label>
            <div class="input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="current-rent" value="3200" oninput="calculateArbitrage()">
            </div>
        </div>

        <div class="input-group">
            <label for="target-destination">Target Nomad Hotspot Destination</label>
            <select id="target-destination" onchange="calculateArbitrage()">
                <option value="1200">Southeast Asia (Thailand/Bali) (~$1,200/mo)</option>
                <option value="1800" selected>Eastern Europe (Budapest/Bulgaria) (~$1,800/mo)</option>
                <option value="2200">Western Europe Hotspots (Portugal/Spain) (~$2,200/mo)</option>
                <option value="1500">Latin America (Medellin/Mexico City) (~$1,500/mo)</option>
            </select>
        </div>

        <div class="results-box">
            <div class="result-row">
                <span class="result-label">Home Country Monthly Savings:</span>
                <span class="result-value" id="home-savings">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">New Destination Target Expenses:</span>
                <span class="result-value" id="destination-expenses" style="color: #f87171;">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Estimated Monthly Savings Increase:</span>
                <span class="result-value" id="savings-increase" style="color: var(--primary);">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Total Projected Annual Savings Surplus:</span>
                <span class="result-value highlight" id="annual-surplus">$0.00</span>
            </div>
        </div>
    </div>

    <div id="sticky-bottom-container">
        <div id="monetag-banner-bottom" style="width:100%; max-width:468px; min-height:60px; text-align:center;"></div>
    </div>

    <script>
        function calculateArbitrage() {
            const salary = parseFloat(document.getElementById('remote-salary').value) || 0;
            const homeExpenses = parseFloat(document.getElementById('current-rent').value) || 0;
            const targetExpenses = parseFloat(document.getElementById('target-destination').value) || 0;

            const homeSavings = salary - homeExpenses;
            const destinationSavings = salary - targetExpenses;
            const savingsIncrease = destinationSavings - homeSavings;
            const annualSurplus = savingsIncrease * 12;

            document.getElementById('home-savings').innerText = homeSavings > 0 ? "$" + homeSavings.toFixed(2) : "$0.00 (No Savings)";
            document.getElementById('destination-expenses').innerText = "$" + targetExpenses.toFixed(2);
            document.getElementById('savings-increase').innerText = savingsIncrease > 0 ? "+$" + savingsIncrease.toFixed(2) : "$" + savingsIncrease.toFixed(2);
            document.getElementById('annual-surplus').innerText = annualSurplus > 0 ? "$" + annualSurplus.toFixed(2) : "$0.00";
        }
        window.onload = function() { calculateArbitrage(); };
    </script>

    <script type="text/javascript">
        (function(s,u,z,p){s.src=u;s.setAttribute('data-zone',z);p.appendChild(s);})(document.createElement('script'),'https://zovidree.com||document.documentElement);
    </script>
    <script type="text/javascript">
        (function(s,u,z,p){s.src=u;s.setAttribute('data-zone',z);p.appendChild(s);})(document.createElement('script'),'https://zovidree.com||document.documentElement);
    </script>
</body>
</html>
